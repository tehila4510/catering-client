<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">כניסה לחשבון</h1>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">אימייל</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="אימייל"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          aria-label="כתובת אימייל"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">סיסמה</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="סיסמה"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="current-password"
            aria-label="סיסמה"
            />
          </div>

          @if (error) {
            <p class="error-msg" role="alert">{{ error }}</p>
          }

          <button type="submit" class="btn-submit" [disabled]="loading" aria-label="כניסה לחשבון">
            @if (!loading) {
              <span>התחברות</span>
            }
            @if (loading) {
              <span>טוען...</span>
            }
          </button>
        </form>

        <p class="auth-link">
          אין לך חשבון?
          <a routerLink="/register" class="btn-link">הירשם כאן</a>
        </p>
      </div>
    </div>
