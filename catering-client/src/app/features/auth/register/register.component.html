<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">יצירת חשבון</h1>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>
      <div class="form-group">
        <label for="name" class="form-label">שם מלא</label>
        <input
          id="name"
          type="text"
          class="form-input"
          placeholder="שם מלא"
          [(ngModel)]="name"
          name="name"
          required
          autocomplete="name"
          aria-label="שם מלא"
          />
        </div>

      <div class="form-group">
        <label for="email" class="form-label">אימייל</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="אימייל"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          aria-label="כתובת אימייל"
          />
        </div>

      <div class="form-group">
        <label for="phone" class="form-label">טלפון</label>
        <input
          id="phone"
          type="tel"
          class="form-input"
          placeholder="טלפון"
          [(ngModel)]="phone"
          name="phone"
          required
          autocomplete="tel"
          aria-label="מספר טלפון"
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">סיסמה</label>
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="סיסמה"
            [(ngModel)]="password"
            name="password"
            required
            autocomplete="new-password"
            aria-label="סיסמה"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">אימות סיסמה</label>
            <input
              id="confirmPassword"
              type="password"
              class="form-input"
              placeholder="אימות סיסמה"
              [(ngModel)]="confirmPassword"
              name="confirmPassword"
              required
              autocomplete="new-password"
              aria-label="אימות סיסמה"
              />
            </div>

            @if (error) {
              <p class="error-msg" role="alert">{{ error }}</p>
            }

            <button type="submit" class="btn-submit" [disabled]="loading" aria-label="הרשמה">
              @if (!loading) {
                <span>הרשמה</span>
              }
              @if (loading) {
                <span>טוען...</span>
              }
            </button>
          </form>

          <p class="auth-link">
            יש לך חשבון?
            <a routerLink="/login" class="btn-link">התחבר כאן</a>
          </p>
        </div>
      </div>
