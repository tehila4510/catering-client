<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">יצירת חשבון</h1>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" novalidate>
      <div class="form-group">
        <label for="email" class="form-label">אימייל</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="אימייל"
          [(ngModel)]="email"
          name="email"
          required
          autocomplete="email"
          aria-label="כתובת אימייל"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">סיסמה</label>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="סיסמה"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="new-password"
          aria-label="סיסמה"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">אימות סיסמה</label>
        <input
          id="confirmPassword"
          type="password"
          class="form-input"
          placeholder="אימות סיסמה"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          autocomplete="new-password"
          aria-label="אימות סיסמה"
        />
      </div>

      <p *ngIf="error" class="error-msg" role="alert">{{ error }}</p>

      <button type="submit" class="btn-submit" [disabled]="loading" aria-label="הרשמה">
        <span *ngIf="!loading">הרשמה</span>
        <span *ngIf="loading">טוען...</span>
      </button>
    </form>

    <p class="auth-link">
      יש לך חשבון?
      <a routerLink="/login">התחבר כאן</a>
    </p>
  </div>
</div>
